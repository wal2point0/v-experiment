        <h1>RED LANTERN ADMIN PORTAL</h1>

        <div class="card admin-login-card w-100 mx-auto">
          <div class="card-body text-center">
            <h2 class="admin-login-title mb-3"><i class="bi bi-shield-lock-fill me-2"></i>Admin Login</h2>

            <div class="mb-3 text-start">
              <label class="form-label">Username</label>
              <input id="adminUsername" type="text" class="form-control" placeholder="Username" />
            </div>

            <div class="mb-3 text-start">
              <label class="form-label">Password</label>
              <input id="adminPassword" type="password" class="form-control" placeholder="Password" />
            </div>

            <button id="adminLoginBtn" class="chinese-start-button admin-login-submit" type="button">
              <span class="chinese-start-button-text"><i class="bi bi-door-open-fill me-1"></i>Login</span>
              <span class="chinese-start-button-background-wrapper">
                <span class="chinese-start-button-background"></span>
              </span>
              <span class="chinese-start-button-bottom-wrapper">
                <span class="chinese-start-button-bottom"></span>
              </span>
            </button>

          </div>
        </div>

        <p class="admin-login-note mt-3 mb-0">You will be redirected to the admin dashboard after login.</p>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(function() {
        $('#adminLoginBtn').click(function() {
          const username = $('#adminUsername').val().trim().toLowerCase();
          const password = $('#adminPassword').val().trim();

          if (username === 'admin' && password === 'password') {
            sessionStorage.setItem('isAdminLoggedIn', 'true');
            // Set session expiry for 30 minutes
            const exp = Date.now() + (30 * 60 * 1000);
            sessionStorage.setItem('adminSessionExpiry', exp);
            window.location.href = 'admin-dashboard.html';
          } else {
            alert('❌ Invalid credentials.');
          }
        });
      });
    </script>
