<!doctype html>
<html lang="en" class="h-100" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Restaurant Admin</title>
    <link rel="icon" type="image/png" href="src/assets/images/lantern.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="style.css" rel="stylesheet">
  </head>

  <body class="d-flex h-100 text-center" style="background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: rgba(255, 255, 255, 0.9);">
    <div class="container py-4 position-relative" style="min-height:100vh;">
      <a href="index.html" class="btn btn-light position-absolute top-0 end-0 m-3">Back to Store</a>
      <div class="text-center mb-3">
        <h1>Admin Dashboard</h1>
      </div>
      <div id="adminPanel" style="display: none;">
        <div class="row mb-4">
          <div class="col-12 d-flex justify-content-between align-items-center">
            <h2>📊 Admin Panel</h2>
            <button id="adminLogout" class="btn btn-warning">Logout</button>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6 mb-3">
            <div class="card bg-dark border-warning">
              <div class="card-header">➕ Create Food Item</div>
              <div class="card-body">
                <div class="mb-2">
                  <input id="adminFoodName" type="text" class="form-control" placeholder="Food name" required />
                </div>
                <div class="mb-2">
                  <input id="adminFoodDesc" type="text" class="form-control" placeholder="Description" />
                </div>
                <div class="mb-2">
                  <input id="adminFoodPrice" type="number" class="form-control" placeholder="Price" step="0.01" required />
                </div>
                <button id="adminCreateFood" class="btn btn-success w-100">Create Item</button>
              </div>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="card bg-dark border-warning">
              <div class="card-header">📋 Food Menu</div>
              <div class="card-body" id="adminMenuList" style="max-height:300px; overflow-y:auto;"></div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card bg-dark border-warning">
              <div class="card-header">📦 All Orders</div>
              <div class="card-body" id="adminOrdersList" style="max-height:400px; overflow-y:auto;"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="adminLoginScreen" class="d-flex justify-content-center align-items-start" style="min-height:calc(100vh - 80px); padding-top: 40px;">
        <div class="col-md-6">
          <div class="card bg-dark border-warning text-center">
            <div class="card-body">
              <h3 class="card-title mb-3">🔐 Admin Login</h3>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input id="adminUsername" type="text" class="form-control" placeholder="admin" value="" />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input id="adminPassword" type="password" class="form-control" placeholder="password" value="" />
              </div>
              <button id="adminLoginBtn" class="btn btn-primary">Login</button>
              <small class="text-muted d-block mt-2">Default: admin / password</small>
            </div>
          </div>
        </div>
      </div>
        <div class="row mb-4">
          <div class="col-12 d-flex justify-content-between align-items-center">
            <h2>📊 Admin Panel</h2>
            <button id="adminLogout" class="btn btn-warning">Logout</button>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6 mb-3">
            <div class="card bg-dark border-warning">
              <div class="card-header">➕ Create Food Item</div>
              <div class="card-body">
                <div class="mb-2">
                  <input id="adminFoodName" type="text" class="form-control" placeholder="Food name" required />
                </div>
                <div class="mb-2">
                  <input id="adminFoodDesc" type="text" class="form-control" placeholder="Description" />
                </div>
                <div class="mb-2">
                  <input id="adminFoodPrice" type="number" class="form-control" placeholder="Price" step="0.01" required />
                </div>
                <button id="adminCreateFood" class="btn btn-success w-100">Create Item</button>
              </div>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="card bg-dark border-warning">
              <div class="card-header">📋 Food Menu</div>
              <div class="card-body" id="adminMenuList" style="max-height:300px; overflow-y:auto;"></div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card bg-dark border-warning">
              <div class="card-header">📦 All Orders</div>
              <div class="card-body" id="adminOrdersList" style="max-height:400px; overflow-y:auto;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.location.href = 'admin-login.html';
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
